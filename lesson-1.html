<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://scastie.scala-lang.org">
  <title>Lesson 1</title>
  <style>
    body { background: #1e1e2e; color: #cdd6f4; padding: 2rem; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    ol { counter-reset: items; list-style: none; padding-left: 0; }
    li { counter-increment: items; display: flex; align-items: flex-start; gap: 0.75rem; margin-bottom: 0.5rem; }
    li::before { content: counter(items); min-width: 1.8rem; height: 1.8rem; background: #313244; border: 1px solid #585b70; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; color: #89b4fa; flex-shrink: 0; margin-top: 0.25rem; transition: background 0.15s, color 0.15s, border-color 0.15s; }
    li.understood::before { background: #a6e3a1; color: #1e1e2e; border-color: #a6e3a1; }
    li.revisit::before { background: #f9e2af; color: #1e1e2e; border-color: #f9e2af; }
    details { flex: 1; min-width: 0; }
    .iframe-pair { display: flex; gap: 0.5rem; width: 100%; height: 60vh; margin-top: 0.5rem; }
    .iframe-column { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .iframe-content { flex: 1; min-height: 0; display: flex; flex-direction: column; }
    iframe { width: 100%; flex: 1; display: block; min-height: 0; border: 0; }
    .iframe-reveal-btn { flex: 1; background: #313244; border: 1px dashed #585b70; border-radius: 6px; color: #89dceb; font-size: 1rem; font-weight: 600; cursor: pointer; font-family: inherit; }
    .iframe-reveal-btn:hover { background: #45475a; border-color: #89dceb; }
    .explanation-details { margin-top: 0.5rem; }
    .explanation-summary { cursor: pointer; padding: 0.4rem 0.7rem; background: #181825; border: 1px solid #313244; border-radius: 6px; color: #89dceb; font-size: 0.85rem; font-weight: 600; list-style: none; display: flex; align-items: center; gap: 0.5rem; user-select: none; }
    .explanation-summary::before { content: "▶"; font-size: 0.7rem; transition: transform 0.15s; }
    .explanation-details[open] > .explanation-summary::before { transform: rotate(90deg); }
    .explanation-details[open] > .explanation-summary { border-radius: 6px 6px 0 0; border-bottom: 0; }
    .explanation-summary:hover { background: #1e1e2e; }
    .explanation-panel { background: #181825; border: 1px solid #313244; border-top: 0; border-radius: 0 0 6px 6px; padding: 1rem; color: #cdd6f4; line-height: 1.55; font-size: 0.9rem; }
    .explanation-panel p { margin: 0 0 0.75rem 0; }
    .explanation-panel p:last-child { margin-bottom: 0; }
    .explanation-panel code { background: #313244; padding: 0.1rem 0.3rem; border-radius: 3px; font-family: ui-monospace, Menlo, monospace; font-size: 0.85em; }
    summary { cursor: pointer; padding: 0.5rem 0.8rem; border-radius: 6px; list-style: none; display: flex; align-items: center; gap: 0.5rem; background: #313244; border: 1px solid #585b70; user-select: none; }
    summary::before { content: "▶"; font-size: 0.75rem; color: #89b4fa; transition: transform 0.15s; flex-shrink: 0; }
    details[open] > summary::before { transform: rotate(90deg); }
    details[open] > summary { border-color: #89b4fa; }
    summary:hover { background: #45475a; }
    .summary-title { flex: 1; min-width: 0; }
    .reset { background: #45475a; color: #cdd6f4; border: 1px solid #585b70; border-radius: 4px; padding: 0.15rem 0.5rem; cursor: pointer; font-size: 0.8rem; font-weight: 600; line-height: 1.2; font-family: inherit; }
    .reset:hover { background: #585b70; }
    .snippet-tools { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.4rem; }
    .pill { padding: 0.15rem 0.5rem; border-radius: 4px; text-decoration: none; font-size: 0.8rem; font-weight: 600; line-height: 1.2; cursor: pointer; border: 1px solid; background: #45475a; }
    .copy-link-icon { background: transparent; border: none; color: #94e2d5; cursor: pointer; font-size: 1rem; padding: 0.15rem 0.4rem; line-height: 1; opacity: 0.65; flex-shrink: 0; font-family: inherit; }
    .copy-link-icon:hover { opacity: 1; }
    .ask-ai { color: #cba6f7; border-color: #cba6f7; font-family: inherit; }
    .ask-ai:hover { background: #cba6f7; color: #1e1e2e; }
    .understood-btn { color: #a6e3a1; border-color: #a6e3a1; font-family: inherit; }
    .marks-row { display: flex; gap: 0.5rem; margin-top: 0.4rem; }
    .understood-btn:hover { background: #45475a; }
    .understood-btn.active, .understood-btn.active:hover { background: #a6e3a1; color: #1e1e2e; }
    .revisit-btn { color: #f9e2af; border-color: #f9e2af; font-family: inherit; }
    .revisit-btn:hover { background: #45475a; }
    .revisit-btn.active, .revisit-btn.active:hover { background: #f9e2af; color: #1e1e2e; }
    .progress-bar { color: #a6adc8; font-size: 0.85rem; margin: 0 0 1.25rem 0; max-width: 60rem; }
    .progress-bar .pct { color: #cdd6f4; font-weight: 600; }
    .progress-bar .revisit-count { color: #f9e2af; }
    .progress-bar .clear-link { background: transparent; border: none; color: #6c7086; cursor: pointer; font: inherit; padding: 0; text-decoration: underline; }
    .progress-bar .clear-link:hover { color: #cdd6f4; }
  </style>
</head>
<body>
  <h1>Control Flow</h1>
  <p style="color:#a6adc8;font-size:0.95rem;line-height:1.5;margin:0 0 1.5rem 0;max-width:60rem;">In many languages, control flow is just something you do. In Scala, control flow is also an expression.</p>
  <p id="progress-bar" class="progress-bar"></p>
  <ol id="snippets"></ol>

  <script>
    const base = "https://scastie.scala-lang.org/";
    const STORAGE_KEY = "scala-cohort:lesson-1";
    function loadStates() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
      catch { return {}; }
    }
    function saveStates(states) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(states));
    }

    async function fetchSnippetData(id) {
      try {
        const res = await fetch(`${base}api/snippets/${id}`);
        if (!res.ok) return null;
        const data = await res.json();
        const inputs = data?.inputs?.SbtInputs;
        if (!inputs) return null;
        const target = inputs.target ?? {};
        const family = Object.keys(target)[0] ?? null;
        const scalaVersion = target[family]?.scalaVersion ?? null;
        return { code: inputs.code ?? null, family, scalaVersion };
      } catch {
        return null;
      }
    }

    function formatVersion(family, scalaVersion) {
      if (family && scalaVersion) return `Scala ${scalaVersion} (${family === "Scala3" ? "Scala 3" : "Scala 2"})`;
      if (scalaVersion) return `Scala ${scalaVersion}`;
      return "Scala";
    }

    function buildPrompt(url, data, customPrompt) {
      const lang = formatVersion(data?.family, data?.scalaVersion);
      const header = `${customPrompt} The code below is written in ${lang}.`;
      if (data?.code) return `${header}\n\nSource:\n\`\`\`scala\n${data.code}\n\`\`\``;
      return `${header}\n\nSource (Scastie): ${url}\n\n(Note: the code itself is on the Scastie page; I couldn't inline it.)`;
    }

    // Each snippet: [brokenId, title, { workingId, prompt }?]
    // Snippets without config show broken-only with no AI button (pending customization).
    const snippets = [
      ["aaD63ObzSSOFHmZj0hKJjQ", "Scala can't handle the truth(iness)!", {
        workingId: "KUhyuUXgSl6ygnNwMfUydQ",
        explanation: `<p>Unlike JavaScript, Python, or C, Scala's <code>if</code> condition must be a <code>Boolean</code>. There's no truthiness coercion — <code>1</code> is an <code>Int</code>, not <code>true</code>, so the compiler rejects it.</p>`,
        prompt: "This snippet doesn't compile and doesn't print \"hi\". Explain why."
      }],
      ["mOw5JEmuSYOpsNLK6TNezA", "This is nearly valid Python code.", {
        workingId: "KzlM6kqVRc6ncoHnAZxsdw",
        explanation: `<p>Python writes ternaries as <code>value_if_true if cond else value_if_false</code>. Scala uses the same <code>if</code>/<code>else</code> pattern as control flow: <code>if (cond) value_if_true else value_if_false</code> — condition first.</p>`,
        prompt: "This snippet doesn't compile. Explain why."
      }],
      ["7kV0xtAgQuWrurEQwgZpNw", "Pulled out the duplicate `print`, but I'm missing something.", {
        workingId: "izA8eAGMTiKkVkuYqxHNkw",
        explanation: `<p>In Scala 3, dropping the parentheses around the condition requires the <code>then</code> keyword to separate it from the body: <code>if cond then value else other</code>. The older <code>if (cond) value</code> style is still supported.</p>`,
        prompt: "What is this snippet missing to compile?"
      }],
      ["Cj7BCpjmSSm27l2OCyX1lw", "I dropped the `else` out of curiosity. What the heck is `()`?", {
        explanation: `<p>In Scala, an <code>if</code> without an <code>else</code> always has type <code>Unit</code> — that is, the value <code>()</code> — regardless of whether the condition is true. So <code>if (true) "hi"</code> doesn't return <code>"hi"</code>; it evaluates <code>"hi"</code> (and discards it), then yields <code>()</code>. That's why <code>print(...)</code> prints <code>()</code>.</p>
<p>The non-unit-discard warning flags exactly this: the <code>"hi"</code> value is being computed and thrown away. The compiler suspects you didn't mean to do that.</p>`,
        prompt: "Why does this print `()`? Why the non-unit-discard warning?"
      }],
      ["qHnjmUOjRUyotM9resVsLg", "Brought my Java `do…while` over and it won't compile.", {
        explanation: `<p>Scala 3 dropped the <code>do … while</code> loop. You can fake it with a regular <code>while</code> whose body lives inside its condition, but most idiomatic Scala avoids the pattern entirely in favor of recursion or higher-order functions.</p>`,
        prompt: "Why doesn't this compile?"
      }],
      ["8RGaQaHmQHOyeXnVJ3NlNQ", "`do`-`while` doesn't work, but `while`-`do` does.", {
        explanation: `<p>A <code>while</code> loop in Scala always evaluates to <code>Unit</code> — the value <code>()</code> — no matter what's in its body, and no matter whether the loop runs at all.</p>`,
        prompt: "Why is the value `()`?"
      }],
      ["gMG5caQSSeGAra2zxHU2Jg", "Why didn't you fall through? I didn't give you a break!", {
        explanation: `<p>Scala's <code>match</code> doesn't fall through to subsequent cases the way a C-style <code>switch</code> does. Once a case matches, that branch runs and the match ends — later cases aren't executed.</p>`,
        prompt: "Why doesn't `case 1` execute?"
      }],
      ["jWgLif97TSeaUJ2D3gWLGQ", "I suspected `match`-`case` might be an expression too.", {
        workingId: "0oAkvMqYQOmDXxHEVMkDcA",
        explanation: `<p>Scala 3's brace-less <code>match</code> requires the cases to begin on a new line, indented under <code>match</code>. The inline form needs explicit braces. And yes — <code>match</code> is an expression that evaluates to the matched case body.</p>`,
        prompt: "Why doesn't this compile?"
      }],
      ["JOzvbvVhRmmJMRY8zn709w", "TypeScript will let you `throw \"shade\"`, but not Scala.", {
        workingId: "wwqQytZRS7KFoHZKZQKgnQ",
        explanation: `<p>Scala runs on the JVM, where only subtypes of <code>Throwable</code> (typically <code>Exception</code> or <code>Error</code>) can be thrown. TypeScript and JavaScript allow throwing arbitrary values; Scala doesn't.</p>`,
        prompt: "Why doesn't this compile?"
      }],
      ["i0lSrEh8SwW5c8TGt0ah4Q", "But I've always been taught there is no try (without an associated catch or finally).", {
        workingId: "W90Bkn9QQf2fP6IJdW8Jwg",
        explanation: `<p>This compiles but warns: a <code>try</code> with no <code>catch</code> or <code>finally</code> is meaningless — there's nothing to handle a thrown exception and nothing to run regardless. The compiler nudges you to add at least one.</p>`,
        prompt: "Why is there a warning?"
      }],
      ["mV09deo8QziWsqqQxZzySg", "I gotta catch 'em all though!", {
        workingId: "VV37tGdvQPSSELloFNhrAw",
        explanation: `<p>The body of a <code>catch</code> needs at least one clause — either a <code>case</code> pattern or a function literal like <code>_ =&gt; ...</code>. An empty <code>{}</code> has nothing to dispatch to, so it doesn't parse. To catch everything, use <code>catch { _ =&gt; }</code>.</p>`,
        prompt: "Why doesn't this compile?"
      }],
      ["X6YM2SNLTcuAUmAkLFG4TQ", "Confirming `try` is an expression.", {
        explanation: `<p><code>try</code> is an expression: it evaluates to the body if no exception is thrown, or to the catch block's result if one is. Here, no exception happens, so the whole expression evaluates to <code>"hi"</code> — the body's value.</p>`,
        prompt: "Why doesn't this evaluate to `()`?"
      }],
      ["WzawBgmnQYuE1xpf1AmRzA", "Now why does this one evaluate to `()`?", {
        explanation: `<p>When the body of a <code>try</code> throws, the whole expression's value comes from the catch block. Here, <code>_ =&gt; </code> is a function literal that takes the exception and returns nothing — i.e., <code>()</code> (Unit). So the expression evaluates to <code>()</code>.</p>`,
        prompt: "Why does this evaluate to `()`?"
      }],
      ["MZN8UrHIToWeYiAiYfb87w", "I thought finally blocks were best practice. Why the warning?", {
        workingId: "fDQHiCwAQVaGQvd2y51Ueg",
        explanation: `<p><code>finally</code> runs for side effects only — its value is always discarded, and the whole expression's value still comes from the try or catch branch. Here, <code>true</code> is a non-Unit expression in <code>finally</code>, so the compiler warns that you're throwing it away.</p>`,
        prompt: "Why is the `true` in `finally` getting a discard warning?"
      }],
      ["ZFKCYOAkR8u2qoEZHB0N8A", "What are these curly braces doing here?", {
        explanation: `<p>Curly braces in Scala denote a block expression: a sequence of expressions that evaluates to the value of its last one. Here <code>{ println(1); 2 }</code> runs <code>println(1)</code> for its side effect, then yields <code>2</code>. The outer <code>println</code> receives <code>2</code> and prints it — so you see <code>1</code> (from inside the block), then <code>2</code> (the block's value).</p>`,
        prompt: "Why does this print `1` then `2`?"
      }],
      ["SXllrUGkRwGg4kbbE6NCPQ", "I was told there would be no semicolons.", {
        explanation: `<p>Semicolons aren't required at the end of a line in Scala — that's the rule most learners hear. But when you put multiple statements on a single line, you need a semicolon to separate them. Here <code>{ println(1); 2 }</code> is the same block as the previous snippet, just compressed onto one line.</p>`,
        prompt: "I thought Scala didn't use semicolons. What's going on?"
      }],
      ["neuEFrWETrOuZrXiM7nRZg", "Run me a few times — looks like a labeled break or early return.", {
        explanation: `<p><code>scala.util.boundary</code> plus <code>boundary.break(...)</code> is Scala 3's structured non-local return: <code>break</code> jumps out of the enclosing <code>boundary</code> block, and the value passed to <code>break</code> becomes the block's result. If <code>break</code> isn't called, the block evaluates to its last expression as usual. Run this a few times — depending on the random <code>Boolean</code>, you'll see either <code>unlucky</code> (from <code>break</code>) or <code>lucky</code> + <code>congrats</code>.</p>`,
        prompt: "What do `boundary` and `break` do here?"
      }],
    ];

    const states = loadStates();
    const applyStatusFns = [];

    function clearProgress() {
      if (!confirm("Clear all progress for this lesson?")) return;
      for (const k of Object.keys(states)) delete states[k];
      saveStates(states);
      applyStatusFns.forEach(fn => fn());
      updateProgress();
    }

    function updateProgress() {
      const bar = document.getElementById("progress-bar");
      if (!bar) return;
      const total = snippets.length;
      let understood = 0, revisit = 0;
      for (const [id] of snippets) {
        if (states[id] === "understood") understood++;
        else if (states[id] === "revisit") revisit++;
      }
      const parts = [`<span class="pct">${understood} / ${total}</span> understood`];
      if (revisit > 0) parts.push(`<span class="revisit-count">${revisit} to revisit</span>`);
      let html = parts.join(" &middot; ");
      if (understood > 0 || revisit > 0) {
        html += ` &middot; <button type="button" class="clear-link">clear progress</button>`;
      }
      bar.innerHTML = html;
      const clearBtn = bar.querySelector(".clear-link");
      if (clearBtn) clearBtn.addEventListener("click", clearProgress);
    }

    function makeIframeColumn(url, { hiddenInitially = false } = {}) {
      const column = document.createElement("div");
      column.className = "iframe-column";


      const iframe = document.createElement("iframe");
      iframe.dataset.src = url;

      const content = document.createElement("div");
      content.className = "iframe-content";

      if (hiddenInitially) {
        const placeholder = document.createElement("button");
        placeholder.type = "button";
        placeholder.className = "iframe-reveal-btn";
        placeholder.textContent = "💡 Reveal";
        placeholder.title = "Reveal the working version";
        placeholder.addEventListener("click", (e) => {
          e.stopPropagation();
          placeholder.remove();
          content.appendChild(iframe);
          if (!iframe.src) iframe.src = url;
        });
        content.appendChild(placeholder);
      } else {
        content.appendChild(iframe);
      }

      column.appendChild(content);
      return { column, iframe };
    }


    const ol = document.getElementById("snippets");
    snippets.forEach(([id, title, config], index) => {
      const url = base + id;
      const workingId = config?.workingId;
      const workingUrl = workingId ? base + workingId : null;
      const customPrompt = config?.prompt;

      const hasWorking = !!workingUrl;
      const hasExplanation = !!config?.explanation;
      const broken = makeIframeColumn(url);
      const working = hasWorking
        ? makeIframeColumn(workingUrl, { hiddenInitially: true })
        : null;

      const pair = document.createElement("div");
      pair.className = "iframe-pair";
      pair.appendChild(broken.column);
      if (working) pair.appendChild(working.column);

      const details = document.createElement("details");
      details.addEventListener("toggle", () => {
        if (details.open && !broken.iframe.src) broken.iframe.src = url;
      });

      const summary = document.createElement("summary");
      const titleSpan = document.createElement("span");
      titleSpan.className = "summary-title";
      titleSpan.textContent = title;
      summary.appendChild(titleSpan);

      const copyLink = document.createElement("button");
      copyLink.type = "button";
      copyLink.className = "copy-link-icon";
      copyLink.textContent = "🔗";
      copyLink.title = "Copy link to this snippet";
      copyLink.addEventListener("click", (e) => {
        e.stopPropagation();
        e.preventDefault();
        const linkUrl = window.location.href.split("#")[0] + `#snippet-${index + 1}`;
        navigator.clipboard.writeText(linkUrl).then(() => {
          copyLink.textContent = "✓";
          setTimeout(() => { copyLink.textContent = "🔗"; }, 1500);
        });
      });
      summary.appendChild(copyLink);

      const li = document.createElement("li");
      li.id = `snippet-${index + 1}`;

      const understoodBtn = document.createElement("button");
      understoodBtn.type = "button";
      understoodBtn.className = "pill understood-btn";
      understoodBtn.textContent = "✓ Understood";
      understoodBtn.title = "Mark as understood";

      const revisitBtn = document.createElement("button");
      revisitBtn.type = "button";
      revisitBtn.className = "pill revisit-btn";
      revisitBtn.textContent = "↺ Revisit";
      revisitBtn.title = "Mark for revisit";

      function applyStatus() {
        const s = states[id];
        understoodBtn.classList.toggle("active", s === "understood");
        revisitBtn.classList.toggle("active", s === "revisit");
        li.classList.remove("understood", "revisit");
        if (s) li.classList.add(s);
      }
      applyStatus();
      applyStatusFns.push(applyStatus);

      function setState(newState) {
        states[id] = (states[id] === newState) ? undefined : newState;
        if (!states[id]) delete states[id];
        saveStates(states);
        applyStatus();
        updateProgress();
      }

      understoodBtn.addEventListener("click", (e) => { e.stopPropagation(); setState("understood"); if (states[id] === "understood") details.open = false; });
      revisitBtn.addEventListener("click", (e) => { e.stopPropagation(); setState("revisit"); if (states[id] === "revisit") details.open = false; });

      details.appendChild(summary);
      details.appendChild(pair);

      const tools = document.createElement("div");
      tools.className = "snippet-tools";

      if (customPrompt) {
        const askAi = document.createElement("button");
        askAi.type = "button";
        askAi.className = "pill ask-ai";
        askAi.textContent = "Ask ChatGPT";
        askAi.title = "Open AI chat with the original snippet prefilled";
        askAi.addEventListener("click", async (e) => {
          e.stopPropagation();
          askAi.textContent = "…";
          const data = await fetchSnippetData(id);
          const prompt = buildPrompt(url, data, customPrompt);
          const target = `https://chatgpt.com/?q=${encodeURIComponent(prompt)}`;
          window.open(target, "ask-ai", "popup=yes,width=1300,height=950");
          askAi.textContent = "Ask ChatGPT";
        });
        tools.appendChild(askAi);
      }

      let explanationEl = null;
      if (hasExplanation) {
        explanationEl = document.createElement("details");
        explanationEl.className = "explanation-details";
        const explanationSummary = document.createElement("summary");
        explanationSummary.className = "explanation-summary";
        explanationSummary.textContent = "💡 Explanation";
        const explanationBody = document.createElement("div");
        explanationBody.className = "explanation-panel";
        explanationBody.innerHTML = config.explanation;
        explanationEl.appendChild(explanationSummary);
        explanationEl.appendChild(explanationBody);
      }

      const resetBtn = document.createElement("button");
      resetBtn.className = "reset";
      resetBtn.textContent = "↻ Reload original code";
      resetBtn.addEventListener("click", () => {
        broken.iframe.src = url;
        if (working && working.iframe && working.iframe.src) working.iframe.src = workingUrl;
      });
      tools.appendChild(resetBtn);

      details.appendChild(tools);
      if (explanationEl) details.appendChild(explanationEl);

      const marksRow = document.createElement("div");
      marksRow.className = "marks-row";
      marksRow.appendChild(understoodBtn);
      marksRow.appendChild(revisitBtn);
      details.appendChild(marksRow);

      li.appendChild(details);
      ol.appendChild(li);
    });

    updateProgress();

    function openFromHash() {
      const hash = window.location.hash;
      if (!hash.startsWith("#snippet-")) return;
      const target = document.querySelector(hash);
      if (!target) return;
      const details = target.querySelector("details");
      if (details) details.open = true;
      target.scrollIntoView({ behavior: "smooth", block: "start" });
    }
    openFromHash();
    window.addEventListener("hashchange", openFromHash);
  </script>
</body>
</html>
